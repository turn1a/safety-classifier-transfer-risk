name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publish the Quarto site to GitHub Pages. Enable Pages once under
# Settings -> Pages -> Source: GitHub Actions.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      # No Python execution in the site yet. When posts gain executable cells,
      # add uv setup + `uv sync` and point QUARTO_PYTHON at .venv/bin/python.
      - name: Render
        run: quarto render docs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
