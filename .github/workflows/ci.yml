name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DO_NOT_TRACK: "1"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Sync dependencies
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type-check (mypy)
        run: uv run mypy src
      - name: Test (pytest)
        run: uv run pytest
      - name: Smoke pipeline (catalog + MLflow wiring)
        run: uv run kedro run --pipeline smoke

  parity:
    # Apple-Silicon runtime parity. Gated to pushes on main (and manual runs) to
    # conserve the free-tier macOS minutes multiplier.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync
      - run: uv run pytest
