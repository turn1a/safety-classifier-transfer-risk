project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - pipeline.qmd
  resources:
    - pipeline-viz/**

website:
  title: "safety-classifier-transfer-risk"
  description: "Measuring adversarial transferability risk for text safety classifiers."
  reader-mode: true
  navbar:
    left:
      - href: index.qmd
        text: Paper
      - href: pipeline.qmd
        text: Pipeline
    right:
      - icon: github
        href: https://github.com/turn1a/safety-classifier-transfer-risk
        aria-label: GitHub
  page-footer:
    left: "MIT licensed. Built with Kedro + Quarto."
    right: "© 2026 Aspen Hazel Olszewska"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    code-copy: true
    code-overflow: wrap

# Cells are not executed at render time; numbers and tables that come from a run are
# written in from the run's catalog artifacts (the similarity stage is complete; the
# attack-transfer results are filled when the sweep finishes). This keeps the GitHub
# Pages build a pure render with no data or Python dependency.
execute:
  freeze: auto
