# Transfer stage: feed every adversarial example to the frozen target and record
# the fraction that flip its prediction (SPEC.md §3.1 step 5).
transfer:
  target: protectai/deberta-v3-base-prompt-injection-v2
  batch_size: 64
  max_seq_len: 256
  # How many worked transfer cases (surrogate AND target flipped) to persist for the write-up's
  # before/after example; the fewest-word-edit, most-varied cases are kept (transferred_examples).
  max_transferred_examples: 8
