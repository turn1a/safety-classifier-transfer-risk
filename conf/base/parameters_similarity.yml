# Similarity stage: per-layer CKA + DBS, then empirical r1/r2 calibration.
# Do NOT hardcode the paper's CNN-derived thresholds — recalibrate on text
# (SPEC.md §3.1 step 3).
similarity:
  n_probe: 2000           # fixed probe-set size (production: upper end of the 1000-2000 range)
  max_seq_len: 512        # token window for the CKA reps; matches the attack/transfer window
  pooling: cls            # cls | mean (hidden-state pooling)
  cka:
    mode: minibatch       # linear | minibatch
    batch_size: 64
  dbs:
    box: 1                # diagonal-box half-width
  thresholds:
    r1_quantile: 0.75     # high-similarity cut (M1)
    r2_quantile: 0.25     # low-similarity cut (M2)
