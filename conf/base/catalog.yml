# Data Catalog — every artifact the pipelines read or write.
#
# Datasets not listed here default to in-memory. Paths follow the Kedro data-
# engineering convention (data/NN_<layer>/). The `metadata.kedro-viz.layer`
# keys group nodes by layer in `kedro viz`.
#
# Raw training sources are pulled straight from the HuggingFace Hub via HFDataset;
# every downstream artifact is written under data/NN_<layer>/.

# --- raw stage (HuggingFace sources) ---------------------------------------
raw_deepset:
  type: kedro_datasets.huggingface.HFDataset
  dataset_name: deepset/prompt-injections
  metadata:
    kedro-viz:
      layer: raw

raw_jackhhao:
  type: kedro_datasets.huggingface.HFDataset
  dataset_name: jackhhao/jailbreak-classification
  metadata:
    kedro-viz:
      layer: raw

raw_lakera:
  type: kedro_datasets.huggingface.HFDataset
  dataset_name: Lakera/gandalf_ignore_instructions
  metadata:
    kedro-viz:
      layer: raw

# --- data stage ------------------------------------------------------------
canonical_dataset:
  type: pandas.ParquetDataset
  filepath: data/03_primary/canonical_dataset.parquet
  metadata:
    kedro-viz:
      layer: primary

task_splits:
  type: pickle.PickleDataset
  filepath: data/05_model_input/task_splits.pkl
  metadata:
    kedro-viz:
      layer: model_input

dataset_audit:
  type: json.JSONDataset
  filepath: data/08_reporting/dataset_audit.json
  metadata:
    kedro-viz:
      layer: reporting

# --- models stage ----------------------------------------------------------
surrogate_registry:
  type: json.JSONDataset
  filepath: data/03_primary/surrogate_registry.json
  metadata:
    kedro-viz:
      layer: primary

# A manifest of trained/recorded surrogates ({name -> kind, source, val_accuracy,
# num_params, ...}). Each trained checkpoint is persisted by the SurrogateModelDataset
# below under data/06_models/<name>/; this JSON is the lightweight provenance index.
surrogate_checkpoints:
  type: json.JSONDataset
  filepath: data/06_models/surrogate_manifest.json
  metadata:
    kedro-viz:
      layer: models

# Per-surrogate checkpoint (a HuggingFace classifier dir or a BiLSTM). The training nodes
# save through this dataset; load `surrogate.<name>` for a ready (model + tokenizer/config)
# bundle. No built-in kedro-datasets class covers a custom-head classifier + the BiLSTM.
"surrogate.{name}":
  type: transfer_risk.datasets.surrogate_model_dataset.SurrogateModelDataset
  filepath: data/06_models/{name}
  metadata:
    kedro-viz:
      layer: models

# --- similarity stage ------------------------------------------------------
probe_set:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/probe_set.parquet
  metadata:
    kedro-viz:
      layer: model_input

cka_matrices:
  type: pickle.PickleDataset
  filepath: data/04_feature/cka_matrices.pkl
  metadata:
    kedro-viz:
      layer: feature

similarity_table:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/similarity_table.parquet
  metadata:
    kedro-viz:
      layer: model_output

thresholds:
  type: json.JSONDataset
  filepath: data/07_model_output/thresholds.json
  metadata:
    kedro-viz:
      layer: model_output

surrogate_selection:
  type: json.JSONDataset
  filepath: data/07_model_output/surrogate_selection.json
  metadata:
    kedro-viz:
      layer: model_output

# --- attacks stage ---------------------------------------------------------
# Per-cell partitions: one pickle per "<surrogate>__<recipe>" cell, so the attacks node can
# skip cells already on disk (resume) and the cloud box can sync completed cells to S3 as they
# land. The node lists this directory itself for resume (PartitionedDataset raises on an empty
# dir, which is the first-run state); the path is kept in sync with attacks.partition_root.
adversarial_examples:
  type: partitions.PartitionedDataset
  path: data/07_model_output/adversarial_examples
  dataset:
    type: pickle.PickleDataset
  filename_suffix: .pkl
  metadata:
    kedro-viz:
      layer: model_output

# --- transfer stage --------------------------------------------------------
transfer_results:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/transfer_results.parquet
  metadata:
    kedro-viz:
      layer: model_output

master_results_table:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: pandas.ParquetDataset
    filepath: data/07_model_output/master_results_table.parquet
  artifact_path: tables
  metadata:
    kedro-viz:
      layer: model_output

# --- risk stage ------------------------------------------------------------
regressors:
  type: pickle.PickleDataset
  filepath: data/06_models/regressors.pkl
  metadata:
    kedro-viz:
      # Trained late, from the model_output table — kept in the model_output band
      # so the viz layer ordering stays acyclic (models are trained before the
      # CKA "feature" stage in this pipeline).
      layer: model_output

ablation_results:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: json.JSONDataset
    filepath: data/07_model_output/ablation_results.json
  artifact_path: results
  metadata:
    kedro-viz:
      layer: model_output

# Headline run scalars (also logged as MLflow metrics by the track_run_metrics node).
run_metrics:
  type: json.JSONDataset
  filepath: data/07_model_output/run_metrics.json
  metadata:
    kedro-viz:
      layer: model_output

# --- reporting stage -------------------------------------------------------
fig_cka_heatmap:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: matplotlib.MatplotlibDataset
    filepath: data/08_reporting/fig_cka_heatmap.png
  artifact_path: figures
  metadata:
    kedro-viz:
      layer: reporting

fig_transfer_scatter:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: matplotlib.MatplotlibDataset
    filepath: data/08_reporting/fig_transfer_scatter.png
  artifact_path: figures
  metadata:
    kedro-viz:
      layer: reporting

fig_regression_ablation:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: matplotlib.MatplotlibDataset
    filepath: data/08_reporting/fig_regression_ablation.png
  artifact_path: figures
  metadata:
    kedro-viz:
      layer: reporting

# --- smoke (wiring check) --------------------------------------------------
smoke_report:
  type: json.JSONDataset
  filepath: data/08_reporting/smoke_report.json
  metadata:
    kedro-viz:
      layer: reporting

# --- dataset factory -------------------------------------------------------
# Per-surrogate hidden-state captures. With this factory, adding a surrogate
# needs no new catalog entry — the similarity pipeline will address datasets as
# `hidden_states.<surrogate>` once it is implemented (SPEC.md §5 model-agnostic
# requirement).
"hidden_states.{surrogate}":
  type: pickle.PickleDataset
  filepath: data/04_feature/hidden_states_{surrogate}.pkl
  metadata:
    kedro-viz:
      layer: feature
