# Models stage. The surrogate layer is model-agnostic: adding a model is a single
# entry here, never a code change (SPEC.md §5). Final M1/M2 membership is decided
# empirically from computed CKA, not from these declarations.
#
# kind:
#   pretrained — already a prompt-injection classifier; loaded as-is.
#   finetune   — a base backbone fine-tuned on the canonical task (label 1 = injection).
#   bilstm     — the from-scratch non-transformer floor.
models:
  target: protectai/deberta-v3-base-prompt-injection-v2
  surrogates:
    - name: deberta-base-pi-v1
      id: protectai/deberta-v3-base-prompt-injection
      kind: pretrained
    - name: deberta-small-pi-v2
      id: protectai/deberta-v3-small-prompt-injection-v2
      kind: pretrained
    - name: deepset-deberta-injection
      id: deepset/deberta-v3-base-injection
      kind: pretrained
    - name: llama-prompt-guard-86m
      id: meta-llama/Llama-Prompt-Guard-2-86M
      kind: pretrained
      gated: true
    - name: llama-prompt-guard-22m
      id: meta-llama/Llama-Prompt-Guard-2-22M
      kind: pretrained
      gated: true
    - name: bert-base-ft
      id: bert-base-uncased
      kind: finetune
    - name: roberta-base-ft
      id: roberta-base
      kind: finetune
    - name: electra-small-ft
      id: google/electra-small-discriminator
      kind: finetune
    # Same backbone as the target's base, a different seed — the CKA sanity anchor (~0.9).
    - name: deberta-base-ft-seed
      id: microsoft/deberta-v3-base
      kind: finetune
    # The deliberate non-transformer floor of the similarity range.
    - name: bilstm-attention
      kind: bilstm
  finetune:
    lr: 2.0e-5
    batch_size: 32
    epochs: 3
    max_seq_len: 256
  bilstm:
    embed_dim: 128
    hidden_dim: 256
    num_layers: 2
    dropout: 0.3
    lr: 1.0e-3
    batch_size: 64
    epochs: 5
    max_vocab: 20000
    max_seq_len: 256
