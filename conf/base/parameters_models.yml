# Models stage. The surrogate layer is model-agnostic. Adding a transformer surrogate is two
# entries: one here ({name, kind}) so the pipeline generates its train/materialise + ONNX
# nodes, and a matching `hub.{name}` (or `target_model`) source in catalog.yml that holds the
# HuggingFace repo id — the catalog owns where every model comes from (SPEC.md §5). The BiLSTM
# has no Hub source. Final M1/M2 membership is decided empirically from computed CKA.
#
# kind:
#   pretrained — already a prompt-injection classifier; materialised from its Hub source as-is.
#   finetune   — a base backbone (Hub source loads with num_labels: 2) fine-tuned on the task.
#   bilstm     — the from-scratch non-transformer floor.
#
# victim: torch — serve this transformer from its torch checkpoint (surrogate.{name}) during the
#   attack sweep instead of its ONNX graph. DeBERTa-v2/v3's disentangled-attention ONNX graph
#   triggers a "MatMul dimension mismatch" in the cloud box's aarch64 onnxruntime at every
#   sequence length (HF transformers #18237); torch runs it correctly. Set it for any model whose
#   config ``model_type`` is ``deberta-v2`` — that includes Meta's Prompt-Guard
#   (``llama-prompt-guard-*``), which is built on mDeBERTa despite the name, so the surrogate name
#   alone is not a reliable signal. Standard-attention transformers (BERT/RoBERTa/ELECTRA) keep the
#   faster ONNX victim. The ONNX graph is still exported (CKA and similarity are unaffected); it is
#   just not the attack victim for these models.
models:
  target: protectai/deberta-v3-base-prompt-injection-v2 # provenance label; loaded via target_model
  surrogates:
    - name: deberta-base-pi-v1
      kind: pretrained
      victim: torch
    # Gated: request access on its HF page before running (needs HF_TOKEN).
    - name: deberta-small-pi-v2
      kind: pretrained
      gated: true
      victim: torch
    - name: deepset-deberta-injection
      kind: pretrained
      victim: torch
    # Meta's Prompt-Guard is built on mDeBERTa (model_type deberta-v2), so it needs the torch victim.
    - name: llama-prompt-guard-86m
      kind: pretrained
      gated: true
      victim: torch
    - name: llama-prompt-guard-22m
      kind: pretrained
      gated: true
      victim: torch
    - name: bert-base-ft
      kind: finetune
    - name: roberta-base-ft
      kind: finetune
    - name: electra-small-ft
      kind: finetune
    # Same backbone as the target's base, a different seed — the CKA sanity anchor (~0.9).
    - name: deberta-base-ft-seed
      kind: finetune
      victim: torch
    # The deliberate non-transformer floor of the similarity range.
    - name: bilstm-attention
      kind: bilstm
  finetune:
    lr: 2.0e-5
    batch_size: 32
    epochs: 3
    max_seq_len: 512 # train + ONNX-trace at the full window the sweep attacks over
  bilstm:
    embed_dim: 128
    hidden_dim: 256
    num_layers: 2
    dropout: 0.3
    lr: 1.0e-3
    batch_size: 64
    epochs: 5
    max_vocab: 20000
    max_seq_len: 512 # BiLSTM trained + attacked at the same window (its wrapper reads this from config)
