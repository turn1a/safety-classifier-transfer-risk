# Risk stage: regression (transfer rate ~ similarity features) and the headline
# M1-vs-M2 selection ablation (SPEC.md §3.1 steps 6-7).
#
# Tree depth is 3, not the paper's 6: with n ≈ surrogates×recipes (tens of rows) a
# depth-6 tree (64 leaves) overfits. The trees are read for feature importance, not
# prediction; Spearman(similarity, transfer) is the primary correlation evidence and
# the selection ablation is the headline test.
risk:
  decision_tree:
    max_depth: 3
  random_forest:
    n_estimators: 200
    max_depth: 4
  ablation:
    # One-sided permutation test, high-CKA (M1) vs low-CKA (M2), on mean and max transfer.
    # Small groups are enumerated exactly (M1 ∪ M2 within C(n,|M1|) <= 2000), so n_permutations
    # only applies if the pool grows past that; the exact path ignores it.
    n_permutations: 10000
    alpha: 0.05
