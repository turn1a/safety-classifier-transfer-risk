# Attacks stage: TextAttack recipes (SPEC.md §8). TextAttack 0.3.10 cannot run on the
# main env (its `flair` dependency imports TransfoXLTokenizer, removed in transformers
# 5.x), so each recipe runs in an isolated subenv (Python 3.11 + transformers<5),
# resolved on the fly by `uv run --no-project` and invoked as a subprocess
# (scripts/run_textattack.py).
#
# Only deepwordbug (char-level) and pwws (saliency-weighted WordNet synonyms) run in the
# lean subenv. bae, bert-attack, and textfooler all use the Universal Sentence Encoder
# semantic constraint (TensorFlow / tensorflow_hub), which the subenv does not carry, so
# they are deferred until the subenv gains TF or the USE constraint is swapped for a
# sentence-transformers one. v1 therefore covers char-level + lexical-synonym failure
# modes; MLM-contextual (bae/bert-attack) is the documented gap (SPEC.md §8).
attacks:
  recipes:
    - deepwordbug
    - pwws
  eval_set_size: 500 # injection prompts attacked per surrogate
  query_budget: 2000 # raise if transfer rates are uniformly low (SPEC.md §11)
  max_seq_len: 256
  subenv:
    python: "3.11"
    packages:
      - "textattack==0.3.10"
      - "transformers<5"
      - "numpy<2"
      - "torch"
      - "sentencepiece"
