# Attacks stage: TextAttack recipes run in-process via the turn1a/TextAttack fork
# (transformers>=5). DeepWordBug (char-level) and PWWS (WordNet synonyms ordered by saliency)
# need no semantic encoder; TextFooler, BAE and BERT-Attack use a sentence-encoder
# similarity constraint, defaulting to a torch-native sentence-transformers model.
#
# The sweep is generated as one node per (surrogate, recipe, example-shard): the pipeline reads
# `recipes`, `eval_set_size`, and `shard_size` at build time to fan out, ParallelRunner runs the
# nodes across cores, and `kedro run --only-missing-outputs` resumes by skipping shards/cells
# already persisted. Victim inference is wired by surrogate kind (transformers from their ONNX
# graph, the BiLSTM from torch), so there is no runtime ONNX toggle and no worker-pool knob.
attacks:
  recipes:
    - deepwordbug
    - pwws
    - textfooler
    - bae
    - bert-attack
  semantic_encoder: sentence-transformers # or "use" (TensorFlow USE; see fork extras)
  # Production sweep: the full test-injection eval set, the model's full 512-token context, and a
  # generous query budget (the dev-tractability clips of 60 / 512 chars / 800 queries are gone).
  eval_set_size: 191 # caps at the available test injections (~191); attack all of them
  # Victim token window. The exported ONNX graph has a dynamic sequence axis, so the attack victim
  # tokenises to this length; keep it in sync with transfer.max_seq_len so the surrogate and the
  # target judge the same text over the same context. 512 is the pool's ceiling (BERT/RoBERTa/
  # ELECTRA max positions; DeBERTa-v3 relative).
  max_seq_len: 512
  # Char truncation before the greedy search. Set above the char-equivalent of max_seq_len so the
  # tokenizer's 512-token truncation binds, not this cut — the search then covers exactly what the
  # victim reads and no prompt is clipped below its context (the long tail is p90 2655 chars).
  max_prompt_chars: 3200
  query_budget: 6000 # per-example victim-query cap; high enough to rarely bind except on robust victims
  # Candidates per victim forward. Pure throughput knob (no effect on any prediction), but the
  # dominant per-worker memory cost: a batch-128 forward through a deberta-v3-base torch victim at
  # 512 tokens peaks ~14.5 GB resident (DeBERTa's disentangled attention), vs ~8 GB at 32. 32 keeps
  # per-worker memory low enough for the run box to fan out across cores without OOM.
  query_batch_size: 32
  # Fan-out scaled to the run box: each (surrogate, recipe) cell is split into shards so a slow
  # cell spreads over cores instead of pinning one. The shard count targets ~shard_multiple * cores
  # total shards across the surrogate×recipe cells (set `cores` to the box's vCPUs), rather than a
  # fixed tiny shard_size that over-shards (4 -> ~2,450 nodes). Set `shard_size` to override the
  # auto value (the thin smoke run does). A fixed cores + seed reproduce exactly; the seeded-RNG
  # recipes (deepwordbug, bae, bert-attack) shift if the shard layout changes, so keep cores fixed
  # within a comparison set.
  cores: 192
  shard_multiple: 2
