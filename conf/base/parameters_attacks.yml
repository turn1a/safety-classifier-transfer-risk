# Attacks stage: TextAttack recipes run in-process in the main env (SPEC.md §8) via the
# turn1a/TextAttack fork (transformers>=5). DeepWordBug (char-level) and PWWS (WordNet
# synonyms ordered by saliency) need no semantic encoder; TextFooler, BAE and BERT-Attack
# use a sentence-encoder semantic-similarity constraint, defaulting to a torch-native
# sentence-transformers model. Set `semantic_encoder: use` to fall back to the original
# TensorFlow Universal Sentence Encoder (needs the textattack[tensorflow] extra).
attacks:
  recipes:
    - deepwordbug
    - pwws
    - textfooler
    - bae
    - bert-attack
  semantic_encoder: sentence-transformers # or "use" (TensorFlow USE; see fork extras)
  eval_set_size: 60 # injection prompts attacked per surrogate (caps at available 191)
  # Truncate each prompt before attacking. The recipes do a greedy word-by-word search, so
  # cost scales with the prompt's word count; the dataset is long-tailed (p90 2655 chars) and
  # untruncated prompts run 130-280 s/example. Injections are front-loaded and the surrogates
  # only have a 256-token context, so bounding the length is a ~10-15x speedup with the
  # comparison left intact (applied uniformly to every surrogate).
  max_prompt_chars: 512
  query_budget: 800 # per-example victim-query cap (was 2000; raise if transfer is uniformly low)
  num_workers: 8 # CPU worker processes for the parallel sweep (~= perf cores; bandwidth-bound past this)
  # Examples per worker task. Sharding a cell's eval set across workers means a slow
  # (surrogate, recipe) cell spreads over cores instead of pinning one. A fixed shard_size and
  # seed reproduce exactly; PWWS is shard-size-invariant, but recipes with seeded random edits
  # (deepwordbug, bae, bert-attack) can shift if shard_size changes, so keep it fixed within
  # any set of runs you compare. Omit or set null/0 to attack each cell in a single shard.
  shard_size: 4
