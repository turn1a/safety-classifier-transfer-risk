# Thin attacks overrides (self-contained; Kedro replaces the whole `attacks` block).
# Three fast recipes — char-level, WordNet synonym, and embedding + sentence-encoder — over
# a handful of examples. BAE/BERT-Attack (masked-LM) are exercised only in the full run.
attacks:
  recipes:
    - deepwordbug
    - pwws
    - textfooler
  semantic_encoder: sentence-transformers
  eval_set_size: 12
  query_budget: 200
  num_workers: 3 # small pool for the thin slice
  max_prompt_chars: 512
  shard_size: 4 # 3 shards over the 12 examples — exercises the sharding path in the smoke run
