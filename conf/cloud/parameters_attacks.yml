# Cloud overrides for the attack sweep (self-contained — Kedro replaces the whole `attacks`
# block). The cloud box is many-core, so auto-size the pool to it, keep small shards so a slow
# cell spreads wide, and serve victims from the exported ONNX graphs. The catalog stays on
# local paths: the cloud box's `aws s3 sync` (in user_data + `just cloud-*`) moves the
# partition directory to and from S3 for cross-machine resume, not Kedro reading s3://.
attacks:
  recipes:
    - deepwordbug
    - pwws
    - textfooler
    - bae
    - bert-attack
  semantic_encoder: sentence-transformers
  eval_set_size: 60
  max_prompt_chars: 512
  query_budget: 800
  num_workers: null # auto -> os.cpu_count() - 2 (use the whole box)
  shard_size: 4
  partition_root: data/07_model_output/adversarial_examples
  use_onnx: true
  onnx_root: data/06_models/onnx
